/* HERO */
.hero{height:25vh;display:flex;justify-content:center;align-items:center;text-align:center;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.7));}
.logo{font-size:3rem;font-weight:900;letter-spacing:5px;}
.subtitulo{margin-top:10px;color:#c9d1d9;font-size:1rem;}

/* MENU */
.menu{display:flex;justify-content:center;gap:20px;padding:25px;flex-wrap:wrap;}
.menu button{background:#161b22;color:white;border:none;padding:15px 35px;border-radius:15px;
cursor:pointer;font-size:1rem;transition:.3s;box-shadow:0 0 10px rgba(0,0,0,.4);}
.menu button:hover{transform:translateY(-4px);background:#21262d;}

/* MAIN */
main{width:90%;max-width:1200px;margin:auto;}
.aba{background:#161b22;padding:30px;border-radius:20px;margin-bottom:25px;
box-shadow:0 0 15px rgba(0,0,0,.4);}
.escondido{display:none;}
.aba h2{text-align:center;margin-bottom:20px;}

/* RANKING */
#ranking{display:flex;flex-direction:column;align-items:center;gap:15px;}

/* CARDS */
.tribo-card,.evento-card,.noticia-card{background:#21262d;padding:20px;border-radius:15px;
transition:.3s;width:100%;max-width:700px;}
.tribo-card:hover{transform:scale(1.02);}
.tribo-card h3,.evento-card h3,.noticia-card h3{margin-bottom:10px;}
.tribo-card p,.evento-card p,.noticia-card p{color:#c9d1d9;margin-bottom:4px;}

/* CARD EVENTO / NOTICIA com acoes */
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.card-header h3{flex:1;}
.card-acoes{display:flex;gap:6px;flex-shrink:0;}
.btn-edit{padding:5px 10px;border:none;border-radius:8px;background:#1f6feb;color:white;
cursor:pointer;font-size:.8rem;transition:.3s;}
.btn-edit:hover{background:#388bfd;}
.btn-del{padding:5px 10px;border:none;border-radius:8px;background:#dc2626;color:white;
cursor:pointer;font-size:.8rem;transition:.3s;}
.btn-del:hover{background:#ef4444;}

/* MEMBROS */
.membros-lista{margin-top:10px;padding-top:10px;border-top:1px solid #30363d;}
.membros-lista p{color:#8b949e;font-size:.85rem;margin-bottom:3px;}
.membro-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;color:#c9d1d9;font-size:.9rem;}
.membro-pontos{background:#1f6feb;color:white;font-weight:700;font-size:.8rem;padding:2px 10px;border-radius:20px;flex-shrink:0;}

/* BADGE RANKING */
.rank-badge{display:inline-block;background:#21262d;border:2px solid #30363d;
border-radius:50%;width:36px;height:36px;line-height:32px;text-align:center;
font-weight:700;font-size:1rem;margin-right:10px;flex-shrink:0;}
.rank-badge.ouro{border-color:#ffd700;color:#ffd700;}
.rank-badge.prata{border-color:#c0c0c0;color:#c0c0c0;}
.rank-badge.bronze{border-color:#cd7f32;color:#cd7f32;}
.tribo-header{display:flex;align-items:center;margin-bottom:8px;}
.tribo-pontos{margin-left:auto;background:#238636;color:white;padding:5px 14px;border-radius:20px;
font-weight:700;font-size:.9rem;flex-shrink:0;}

/* BOTÕES FIXOS */
.fixed-btns{position:fixed;left:20px;bottom:20px;display:flex;flex-direction:column;gap:12px;z-index:999;}
.admin-btn{width:65px;height:65px;border:none;border-radius:50%;background:#21262d;
color:white;font-size:25px;cursor:pointer;transition:.3s;box-shadow:0 0 15px rgba(0,0,0,.5);}
.admin-btn:hover{transform:scale(1.1);}

/* LINKS FIXOS direita */
.fixed-right{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:12px;z-index:999;}
.zap,.loja-btn{width:65px;height:65px;border-radius:50%;display:flex;justify-content:center;
align-items:center;text-decoration:none;color:white;font-size:28px;transition:.3s;border:none;cursor:pointer;}
.zap{background:#25D366;box-shadow:0 0 20px rgba(37,211,102,.5);}
.zap:hover{transform:scale(1.1);}
.loja-btn{background:#e25822;box-shadow:0 0 20px rgba(226,88,34,.4);font-size:24px;}
.loja-btn:hover{transform:scale(1.1);}

/* FOOTER */
.footer{text-align:center;padding:30px;margin-top:30px;background:#161b22;}
.footer h3{margin-bottom:10px;}
.footer p{color:#c9d1d9;margin-top:5px;}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;
display:flex;align-items:center;justify-content:center;}
.overlay.escondido{display:none;}
.modal{background:#161b22;border-radius:20px;padding:35px;width:90%;max-width:440px;
box-shadow:0 0 40px rgba(0,0,0,.7);position:relative;max-height:90vh;overflow-y:auto;}
.modal h2{text-align:center;margin-bottom:20px;font-size:1.4rem;}
.modal input,.modal select,.modal textarea{width:100%;padding:12px 15px;border-radius:10px;
border:1px solid #30363d;background:#21262d;color:white;font-size:1rem;margin-bottom:12px;
outline:none;resize:vertical;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#58a6ff;}
.modal-btns{display:flex;gap:10px;margin-top:5px;}
.btn-primario{flex:1;padding:12px;border:none;border-radius:10px;background:#238636;
color:white;font-size:1rem;cursor:pointer;transition:.3s;}
.btn-primario:hover{background:#2ea043;}
.btn-secundario{flex:1;padding:12px;border:none;border-radius:10px;background:#21262d;
color:white;font-size:1rem;cursor:pointer;transition:.3s;}
.btn-secundario:hover{background:#30363d;}
.btn-danger{flex:1;padding:12px;border:none;border-radius:10px;background:#dc2626;
color:white;font-size:1rem;cursor:pointer;transition:.3s;}
.btn-danger:hover{background:#ef4444;}
.close-modal{position:absolute;top:15px;right:18px;background:none;border:none;
color:#8b949e;font-size:1.4rem;cursor:pointer;}
.close-modal:hover{color:white;}

/* PAINEL ADMIN */
#painelOverlay .modal{max-width:500px;}
.admin-opcoes{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.admin-op-btn{width:100%;padding:13px;border:none;border-radius:12px;background:#21262d;

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
/* ============================================================
   CONFIGURAÇÃO DO FIREBASE
   Substitua os valores abaixo pelos dados do SEU projeto.
   (Firebase Console > Configurações do projeto > Seus apps > Web)
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyC4Ya6ONwNGr7Umw2kcUScN2G6R_7_dkCg",
  authDomain: "titans-sleyar.firebaseapp.com",
  databaseURL: "https://titans-sleyar-default-rtdb.firebaseio.com",
  projectId: "titans-sleyar",
  storageBucket: "titans-sleyar.firebasestorage.app"
};

/* E-mail do usuário admin criado em Authentication > Users.
   A SENHA do admin no site passa a ser a senha desse usuário. */
const ADMIN_EMAIL = "brenorafaferreira@gmail.com";

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

/* === DADOS === */
let adminLogado = false;
let acaoAtual = '';
let gerenciarTipo = '';
let gerenciarAcao = '';

let tribos = [];
let eventos = [];
let noticias = [];

/* Converte snapshot do Firebase (que pode virar objeto em vez de array) para array */
function toArray(val){
  if(!val) return [];
  return Array.isArray(val) ? val : Object.values(val);
}

/* Garante que cada membro tenha {nome, pontos} mesmo em dados antigos */
function corrigirTribos(lista){
  return toArray(lista).map(t => {
    if(!t.membros_lista) t.membros_lista = [];
    t.membros_lista = toArray(t.membros_lista).map(m =>
      typeof m === 'string' ? {nome:m, pontos:0} : {nome:m.nome, pontos:m.pontos||0}
    );
    return t;
  });
}

/* === SINCRONIZAÇÃO EM TEMPO REAL COM O FIREBASE === */
db.ref('tribos').on('value', snap => {
  tribos = corrigirTribos(snap.val());
  renderizarTribos();
});
db.ref('eventos').on('value', snap => {
  eventos = toArray(snap.val());
  renderizarEventos();
});
db.ref('noticias').on('value', snap => {
  noticias = toArray(snap.val());
  renderizarNoticias();
});

/* Salva os dados atuais no Firebase (visível em todos os dispositivos) */
function salvarDados(){
  db.ref('tribos').set(tribos);
  db.ref('eventos').set(eventos);
  db.ref('noticias').set(noticias);
}

/* === ABAS === */
function mostrarAba(nome){
  document.querySelectorAll('.aba').forEach(a => a.classList.add('escondido'));
  document.getElementById(nome).classList.remove('escondido');
}

/* === MODAIS === */
function abrirModal(id){ fecharTodosModais(); document.getElementById(id).classList.remove('escondido'); }
function fecharModal(id){ document.getElementById(id).classList.add('escondido'); }
function fecharTodosModais(){ document.querySelectorAll('.overlay').forEach(o => o.classList.add('escondido')); }

document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if(e.target === ov) ov.classList.add('escondido'); });
});

function msg(elemId, texto, tipo='ok'){
  const el = document.getElementById(elemId);
  if(!el) return;
  el.innerHTML = `<div class="msg ${tipo}">${texto}</div>`;
  setTimeout(() => { if(el) el.innerHTML=''; }, 3000);
}

/* === ADMIN === */
function abrirAdmin(){
  if(adminLogado){ abrirModal('painelOverlay'); return; }
  document.getElementById('campoSenha').value='';
  document.getElementById('senhaMsg').innerHTML='';
  abrirModal('senhaOverlay');
  setTimeout(() => document.getElementById('campoSenha').focus(), 100);
}
function verificarSenha(){
  const senha = document.getElementById('campoSenha').value;
  if(!senha){ msg('senhaMsg','Digite a senha.','erro'); return; }
  auth.signInWithEmailAndPassword(ADMIN_EMAIL, senha)
    .then(() => {
      adminLogado = true;
      fecharModal('senhaOverlay');
      abrirModal('painelOverlay');
      renderizarEventos(); renderizarNoticias();
    })
    .catch(() => { msg('senhaMsg','Senha incorreta!','erro'); });
}
function logout(){
  adminLogado = false;
  auth.signOut();
  fecharModal('painelOverlay');
  renderizarEventos(); renderizarNoticias();
}

/* Mantém o admin logado entre recarregamentos da página */
auth.onAuthStateChanged(user => {
  adminLogado = !!user;
  renderizarEventos(); renderizarNoticias();
});

/* === TRIBO === */
function adicionarTribo(){
  const nome = document.getElementById('triboNome').value.trim();
  const lider = document.getElementById('triboLider').value.trim();
  if(!nome||!lider){ msg('addTriboMsg','Preencha todos os campos.','erro'); return; }
  tribos.push({nome, lider, membros_lista:[]});
  salvarDados(); renderizarTribos();
  document.getElementById('triboNome').value='';
  document.getElementById('triboLider').value='';
  msg('addTriboMsg','Tribo criada!','ok');
}

/* === SELECIONAR TRIBO === */
function abrirSelecionarTribo(acao){
  acaoAtual = acao;
  fecharTodosModais();
  const titulos = {addMembro:'👤 Adicionar Membro',removerMembro:'🚫 Remover Membro',adicionarPontos:'💰 Adicionar Pontos',removerPontos:'📉 Remover Pontos',renomearTribo:'✏️ Alterar Nome',apagarTribo:'🗑️ Apagar Tribo'};
  document.getElementById('selecionarTriboTitulo').textContent = titulos[acao]||'Selecionar Tribo';
  document.getElementById('selecionarTriboMsg').innerHTML='';
  document.getElementById('campoAddMembro').classList.add('escondido');
  document.getElementById('campoRemoverMembro').classList.add('escondido');
  document.getElementById('campoPontos').classList.add('escondido');
  document.getElementById('campoRenomear').classList.add('escondido');
  document.getElementById('novoMembroNome').value='';
  document.getElementById('valorPontos').value='';
  document.getElementById('novoNomeTribo').value='';
  const sel = document.getElementById('selecionarTriboSelect');
  sel.innerHTML='<option value="">-- Escolha uma tribo --</option>';
  tribos.forEach((t,i) => sel.innerHTML += `<option value="${i}">${t.nome}</option>`);
  sel.value=''; sel.onchange = () => onSelecionarTribo();
  const btns = document.getElementById('selecionarTriboBtns');
  if(acao==='apagarTribo'){
    btns.innerHTML=`<button class="btn-secundario" onclick="fecharModal('selecionarTriboOverlay')">Cancelar</button><button class="btn-danger" onclick="executarAcaoTribo()">Apagar</button>`;
  } else {
    btns.innerHTML=`<button class="btn-secundario" onclick="fecharModal('selecionarTriboOverlay')">Cancelar</button><button class="btn-primario" onclick="executarAcaoTribo()">Confirmar</button>`;
  }
  abrirModal('selecionarTriboOverlay');
}

function onSelecionarTribo(){
  const idx = document.getElementById('selecionarTriboSelect').value;
  if(idx==='') return;
  if(acaoAtual==='addMembro') document.getElementById('campoAddMembro').classList.remove('escondido');
  if(acaoAtual==='removerMembro'){
    document.getElementById('campoRemoverMembro').classList.remove('escondido');
    const sel = document.getElementById('membroParaRemover');
    sel.innerHTML='<option value="">-- Escolha um membro --</option>';
    (tribos[idx].membros_lista||[]).forEach((m,i) => sel.innerHTML += `<option value="${i}">${m.nome}</option>`);
  }
  if(acaoAtual==='adicionarPontos'||acaoAtual==='removerPontos'){
    document.getElementById('campoPontos').classList.remove('escondido');
    document.getElementById('valorPontos').placeholder = acaoAtual==='adicionarPontos'
      ? 'Quantidade de pontos a adicionar'
      : 'Quantidade de pontos a remover';
    const sel = document.getElementById('membroParaPontos');
    sel.innerHTML='<option value="">-- Escolha um membro --</option>';
    (tribos[idx].membros_lista||[]).forEach((m,i) => sel.innerHTML += `<option value="${i}">${m.nome} (${m.pontos||0} pts)</option>`);
  }
  if(acaoAtual==='renomearTribo'){
    document.getElementById('campoRenomear').classList.remove('escondido');
    document.getElementById('novoNomeTribo').value = tribos[idx].nome;
  }
}

function executarAcaoTribo(){
  const idx = parseInt(document.getElementById('selecionarTriboSelect').value);
  if(isNaN(idx)){ msg('selecionarTriboMsg','Selecione uma tribo.','erro'); return; }
  if(acaoAtual==='addMembro'){
    const nome = document.getElementById('novoMembroNome').value.trim();
    if(!nome){ msg('selecionarTriboMsg','Digite o nome.','erro'); return; }
    if(!tribos[idx].membros_lista) tribos[idx].membros_lista=[];
    tribos[idx].membros_lista.push({nome, pontos:0});
    salvarDados(); renderizarTribos();
    msg('selecionarTriboMsg','Membro adicionado!','ok');
    document.getElementById('novoMembroNome').value='';
  } else if(acaoAtual==='removerMembro'){
    const mIdx = parseInt(document.getElementById('membroParaRemover').value);
    if(isNaN(mIdx)){ msg('selecionarTriboMsg','Selecione um membro.','erro'); return; }
    tribos[idx].membros_lista.splice(mIdx,1);
    salvarDados(); renderizarTribos();
    const sel = document.getElementById('membroParaRemover');
    sel.innerHTML='<option value="">-- Escolha um membro --</option>';
    (tribos[idx].membros_lista||[]).forEach((m,i) => sel.innerHTML += `<option value="${i}">${m.nome}</option>`);
    msg('selecionarTriboMsg','Membro removido!','ok');
  } else if(acaoAtual==='adicionarPontos'||acaoAtual==='removerPontos'){
    const mIdx = parseInt(document.getElementById('membroParaPontos').value);
    const valorDigitado = parseInt(document.getElementById('valorPontos').value);
    if(isNaN(mIdx)){ msg('selecionarTriboMsg','Selecione um membro.','erro'); return; }
    if(isNaN(valorDigitado)){ msg('selecionarTriboMsg','Digite a quantidade de pontos.','erro'); return; }
    const valor = acaoAtual==='removerPontos' ? -Math.abs(valorDigitado) : Math.abs(valorDigitado);
    const novoTotal = (tribos[idx].membros_lista[mIdx].pontos||0) + valor;
    tribos[idx].membros_lista[mIdx].pontos = Math.max(0, novoTotal);
    salvarDados(); renderizarTribos();
    const sel = document.getElementById('membroParaPontos');
    sel.innerHTML='<option value="">-- Escolha um membro --</option>';
    (tribos[idx].membros_lista||[]).forEach((m,i) => sel.innerHTML += `<option value="${i}">${m.nome} (${m.pontos||0} pts)</option>`);
    document.getElementById('valorPontos').value='';
    msg('selecionarTriboMsg',`Pontos atualizados! Total agora: ${tribos[idx].membros_lista[mIdx].pontos}`,'ok');
  } else if(acaoAtual==='renomearTribo'){
    const novo = document.getElementById('novoNomeTribo').value.trim();
    if(!novo){ msg('selecionarTriboMsg','Digite um nome.','erro'); return; }
    tribos[idx].nome=novo; salvarDados(); renderizarTribos();
    const s = document.getElementById('selecionarTriboSelect');
    s.options[s.selectedIndex].text=novo;
    msg('selecionarTriboMsg','Nome alterado!','ok');
  } else if(acaoAtual==='apagarTribo'){
    tribos.splice(idx,1); salvarDados(); renderizarTribos();
    fecharModal('selecionarTriboOverlay');
  }
}

/* === ADD EVENTO === */
function adicionarEvento(){
  const titulo = document.getElementById('eventoTitulo').value.trim();
  const descricao = document.getElementById('eventoDesc').value.trim();
  if(!titulo||!descricao){ msg('addEventoMsg','Preencha todos os campos.','erro'); return; }
  eventos.push({titulo, descricao});
  salvarDados(); renderizarEventos();
  document.getElementById('eventoTitulo').value='';
  document.getElementById('eventoDesc').value='';
  msg('addEventoMsg','Evento adicionado!','ok');
}

/* === ADD NOTICIA === */
function adicionarNoticia(){
  const titulo = document.getElementById('noticiaTitulo').value.trim();
  const texto = document.getElementById('noticiaTexto').value.trim();
  if(!titulo||!texto){ msg('addNoticiaMsg','Preencha todos os campos.','erro'); return; }
  noticias.push({titulo, texto});
  salvarDados(); renderizarNoticias();
  document.getElementById('noticiaTitulo').value='';
  document.getElementById('noticiaTexto').value='';
  msg('addNoticiaMsg','Notícia adicionada!','ok');
}

/* === GERENCIAR LISTA (editar/remover evento ou noticia) === */
function abrirGerenciarLista(tipo, acao){
  gerenciarTipo = tipo;
  gerenciarAcao = acao;
  fecharTodosModais();

  const lista = tipo==='evento' ? eventos : noticias;
  const labelTipo = tipo==='evento' ? 'Evento' : 'Notícia';
  const labelAcao = acao==='editar' ? '✏️ Editar' : '🗑️ Remover';
  document.getElementById('gerenciarTitulo').textContent = `${labelAcao} ${labelTipo}`;
  document.getElementById('gerenciarMsg').innerHTML='';
  document.getElementById('camposEdicao').classList.add('escondido');

  const sel = document.getElementById('gerenciarSelect');
  sel.innerHTML='<option value="">-- Selecione --</option>';
  lista.forEach((item,i) => sel.innerHTML += `<option value="${i}">${item.titulo}</option>`);
  sel.value='';
  sel.onchange = () => onSelecionarItem();

  const btns = document.getElementById('gerenciarBtns');
  if(acao==='remover'){
    btns.innerHTML=`<button class="btn-secundario" onclick="fecharModal('gerenciarListaOverlay')">Cancelar</button><button class="btn-danger" onclick="executarAcaoLista()">Remover</button>`;
  } else {
    btns.innerHTML=`<button class="btn-secundario" onclick="fecharModal('gerenciarListaOverlay')">Cancelar</button><button class="btn-primario" onclick="executarAcaoLista()">Salvar</button>`;
  }
  abrirModal('gerenciarListaOverlay');
}

function onSelecionarItem(){
  const idx = parseInt(document.getElementById('gerenciarSelect').value);
  if(isNaN(idx)) return;
  const lista = gerenciarTipo==='evento' ? eventos : noticias;
  const item = lista[idx];
  if(gerenciarAcao==='editar'){
    document.getElementById('camposEdicao').classList.remove('escondido');
    document.getElementById('editCampo1').placeholder = 'Título';
    document.getElementById('editCampo1').value = item.titulo;
    if(gerenciarTipo==='evento'){
      document.getElementById('editCampo2').placeholder = 'Descrição';
      document.getElementById('editCampo2').value = item.descricao;
    } else {
      document.getElementById('editCampo2').placeholder = 'Texto';
      document.getElementById('editCampo2').value = item.texto;
    }
  }
}

function executarAcaoLista(){
  const idx = parseInt(document.getElementById('gerenciarSelect').value);
  if(isNaN(idx)){ msg('gerenciarMsg','Selecione um item.','erro'); return; }
  const lista = gerenciarTipo==='evento' ? eventos : noticias;

  if(gerenciarAcao==='remover'){
    lista.splice(idx,1);
    salvarDados();
    if(gerenciarTipo==='evento') renderizarEventos(); else renderizarNoticias();
    // Atualizar select
    const sel = document.getElementById('gerenciarSelect');
    sel.innerHTML='<option value="">-- Selecione --</option>';
    lista.forEach((item,i) => sel.innerHTML += `<option value="${i}">${item.titulo}</option>`);
    sel.value='';
    document.getElementById('camposEdicao').classList.add('escondido');
    msg('gerenciarMsg','Removido com sucesso!','ok');
  } else if(gerenciarAcao==='editar'){
    const titulo = document.getElementById('editCampo1').value.trim();
    const campo2 = document.getElementById('editCampo2').value.trim();
    if(!titulo||!campo2){ msg('gerenciarMsg','Preencha todos os campos.','erro'); return; }
    lista[idx].titulo = titulo;
    if(gerenciarTipo==='evento') lista[idx].descricao=campo2; else lista[idx].texto=campo2;
    salvarDados();
    if(gerenciarTipo==='evento') renderizarEventos(); else renderizarNoticias();
    // Atualizar select
    const sel = document.getElementById('gerenciarSelect');
    sel.options[sel.selectedIndex].text = titulo;
    msg('gerenciarMsg','Salvo com sucesso!','ok');
  }
}

/* === PONTOS DA TRIBO === */
function calcularPontosTribo(tribo){
  return (tribo.membros_lista||[]).reduce((total,m)=>total+(m.pontos||0),0);
}

/* === RENDER TRIBOS === */
function renderizarTribos(){
  const ranking = document.getElementById('ranking');
  ranking.innerHTML='';
  if(tribos.length===0){
    ranking.innerHTML='<div class="tribo-card" style="text-align:center;color:#8b949e;">Nenhuma tribo cadastrada.</div>';
    return;
  }
  const sorted = [...tribos].sort((a,b)=>calcularPontosTribo(b)-calcularPontosTribo(a));
  sorted.forEach((tribo,index)=>{
    const pos=index+1;
    let badgeClass='';
    if(pos===1) badgeClass='ouro'; else if(pos===2) badgeClass='prata'; else if(pos===3) badgeClass='bronze';
    const membros=tribo.membros_lista||[];
    const totalPontos=calcularPontosTribo(tribo);
    const membrosHtml=membros.length>0
      ?`<div class="membros-lista"><p style="margin-bottom:6px;color:#58a6ff;font-size:.85rem;">Membros (${membros.length})</p>${membros.map(m=>`<div class="membro-item"><span>👤 ${m.nome}</span><span class="membro-pontos">${m.pontos||0} pts</span></div>`).join('')}</div>`
      :`<div class="membros-lista"><p>Sem membros cadastrados.</p></div>`;
    ranking.innerHTML+=`
      <div class="tribo-card">
        <div class="tribo-header"><span class="rank-badge ${badgeClass}">#${pos}</span><h3>${tribo.nome}</h3><span class="tribo-pontos">🔥 ${totalPontos} pts</span></div>
        <p>👑 Líder: ${tribo.lider}</p>
        <p>👥 ${membros.length} membro(s)</p>
        ${membrosHtml}
      </div>`;
  });
}

/* === RENDER EVENTOS === */
function renderizarEventos(){
  const lista = document.getElementById('listaEventos');
  lista.innerHTML='';
  if(eventos.length===0){
    lista.innerHTML='<div class="evento-card" style="text-align:center;color:#8b949e;">Nenhum evento cadastrado.</div>';
    return;
  }
  eventos.forEach((ev,i)=>{
    lista.innerHTML+=`
      <div class="evento-card">
        <div class="card-header">
          <h3>${ev.titulo}</h3>
          ${adminLogado?`<div class="card-acoes">
            <button class="btn-edit" onclick="editarItemDireto('evento',${i})">✏️</button>
            <button class="btn-del" onclick="removerItemDireto('evento',${i})">🗑️</button>
          </div>`:''}
        </div>
        <p>${ev.descricao}</p>
      </div>`;
  });
}

/* === RENDER NOTICIAS === */
function renderizarNoticias(){
  const lista = document.getElementById('listaNoticias');
  lista.innerHTML='';
  if(noticias.length===0){
    lista.innerHTML='<div class="noticia-card" style="text-align:center;color:#8b949e;">Nenhuma notícia cadastrada.</div>';
    return;
  }
  noticias.forEach((n,i)=>{
    lista.innerHTML+=`
      <div class="noticia-card">
        <div class="card-header">
          <h3>${n.titulo}</h3>
          ${adminLogado?`<div class="card-acoes">
            <button class="btn-edit" onclick="editarItemDireto('noticia',${i})">✏️</button>
            <button class="btn-del" onclick="removerItemDireto('noticia',${i})">🗑️</button>
          </div>`:''}
        </div>
        <p>${n.texto}</p>
      </div>`;
  });
}

/* === AÇÕES DIRETAS NOS CARDS === */
function editarItemDireto(tipo, idx){
  gerenciarTipo=tipo; gerenciarAcao='editar';
  abrirGerenciarLista(tipo,'editar');
  setTimeout(()=>{
    document.getElementById('gerenciarSelect').value=idx;
    onSelecionarItem();
  },50);
}
function removerItemDireto(tipo, idx){
  gerenciarTipo=tipo; gerenciarAcao='remover';
  const lista = tipo==='evento'?eventos:noticias;
  lista.splice(idx,1);
  salvarDados();
  if(tipo==='evento') renderizarEventos(); else renderizarNoticias();
}
